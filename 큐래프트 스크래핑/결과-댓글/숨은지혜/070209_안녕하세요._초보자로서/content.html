  <!----><!----><div data-v-bfe32ea0="" data-v-e0f26398=""><div data-v-e0f26398="" class="article_content_se" data-v-bfe32ea0=""><p>안녕하세요.</p> <p>&nbsp;</p> <p>참 유용한 자료가 많은 거 같아 좋네요.</p> <p>그런데 초보자로서 접하기엔 좀 어려운 것도 있네요.</p> <p>(다 어려우니까 산만해 보이기도 하구</p> <p>막막해 보이기도 하구요.)</p> <p>&nbsp;</p> <p>초보자가 처음 접할때 도움이 될만한 자료 </p> <p>좀 부탁드립니다.</p> <p>글 하나 정도에 정리해서 올려 주시면 좋겠네요.</p> <p>&nbsp;</p> <p>그럼 안녕히 계세요.&nbsp;</p> <p>&nbsp;</p></div></div><!----><p data-v-e0f26398="" class="nsm" style="display: none;"><span data-v-e0f26398="" class="ic_atch ic_poll"></span> 투표는 표시되지 않습니다. </p><!----><!----><!---->
